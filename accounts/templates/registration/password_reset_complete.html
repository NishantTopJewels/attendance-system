<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Setup Complete</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 50px;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 {
            margin-top: 0;
            color: #28a745;
        }
        .btn-login {
            display: inline-block;
            margin-top: 20px;
            background: #007bff;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 4px;
        }
        .btn-login:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Setup Complete!</h2>
        <p>Your password has been successfully set. Your account is now fully active.</p>
        <p>You may now log in with your roll number and the password you just created.</p>
        <a href="{% url 'root_login' %}" class="btn-login">Go to Login</a>
    </div>
</body>
</html>
